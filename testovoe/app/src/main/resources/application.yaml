server:
  port: 8092

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /api.yaml
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
spring:
  datasource:
    schema: HOTELS
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS HOTELS"
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog.xml
    default-schema: HOTELS
  jpa:
    properties:
      hibernate:
        default_schema: HOTELS
        format_sql: false
        database-platform: org.hibernate.dialect.H2Dialect

